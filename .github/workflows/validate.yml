name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate agent configs with agnix
        uses: agent-sh/agnix@v0.36.0
        with:
          path: .
          config: .agnix.toml
          target: generic
          version: v0.36.0
          strict: "false"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_catalog.py
      - run: python scripts/validate_evaluator_plan.py
      - run: python scripts/run_evals.py --validate
      - run: python scripts/validate_executable_tasks.py --run-oracles
      - run: python scripts/run_executable_tasks.py --candidate-dir evaluation/fixtures/executable-candidates/oracle --label ci-smoke --fail-under-pass-rate 1.0
      - run: |
          python scripts/compare_eval_arms.py \
            --baseline-dir evaluation/fixtures/answers/baseline \
            --skill-dir evaluation/fixtures/answers/skill-explicit \
            --skill uxl-onemath \
            --eval onemath-dispatch-choice \
            --label ci-smoke \
            --output-dir /tmp/uxl-eval-scorecard \
            --fail-under-skill-score 1.0 \
            --fail-under-delta 0.5
      - run: python scripts/generate_agent_wrappers.py --check
      - run: python scripts/check_links.py --timeout 15 --retries 1 --warn-transient-network-errors
      - run: python skills/uxl-sycl-build-debug/scripts/sycl_probe.py
      - run: |
          cat > /tmp/uxl_perf_smoke.csv <<'CSV'
          case,variant,seconds,correct
          smoke,baseline,1.0,true
          smoke,baseline,1.2,true
          smoke,candidate,0.8,true
          smoke,candidate,0.9,true
          CSV
          python skills/uxl-performance-validation/scripts/summarize_runs.py /tmp/uxl_perf_smoke.csv
